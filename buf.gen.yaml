version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/saitamau-maximum/maxicloud/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/gosimple
    out: gen
    opt:
      - paths=source_relative
      - simple
  # TODO: 辛かったらフロントとバックを分ける
  - local: ./dashboard/node_modules/.bin/protoc-gen-es
    out: ./dashboard/app/gen
    include_imports: true
    opt: target=ts 
inputs:
  - directory: proto
