apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: system
  labels:
    app.kubernetes.io/name: maxicloud
    app.kubernetes.io/managed-by: kustomize
spec:
  # 一旦デバックようにCloudflare TunnelのIngressClassを指定する
  ingressClassName: cloudflare-tunnel
  rules:
    - host: maxicloud.nomanoma-dev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
