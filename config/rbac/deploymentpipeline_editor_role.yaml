# This rule is not used by the project maxicloud itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the maxicloud.maximum.vc.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: maxicloud
    app.kubernetes.io/managed-by: kustomize
  name: deploymentpipeline-editor-role
rules:
- apiGroups:
  - maxicloud.maximum.vc
  resources:
  - deploymentpipelines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - maxicloud.maximum.vc
  resources:
  - deploymentpipelines/status
  verbs:
  - get
