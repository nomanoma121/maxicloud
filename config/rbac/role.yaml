---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - maxicloud.maximum.vc
  resources:
  - applications
  - buildruns
  - deploymentpipelines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - maxicloud.maximum.vc
  resources:
  - applications/finalizers
  - buildruns/finalizers
  - deploymentpipelines/finalizers
  verbs:
  - update
- apiGroups:
  - maxicloud.maximum.vc
  resources:
  - applications/status
  - buildruns/status
  - deploymentpipelines/status
  verbs:
  - get
  - patch
  - update
