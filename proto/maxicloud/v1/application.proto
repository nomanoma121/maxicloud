syntax = "proto3";

package maxicloud.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "maxicloud/v1/common.proto";

enum ApplicationStatus {
  APPLICATION_STATUS_UNSPECIFIED = 0;
  APPLICATION_STATUS_HEALTHY = 1;
  APPLICATION_STATUS_DEGRADED = 2;
  APPLICATION_STATUS_UNHEALTHY = 3;
  APPLICATION_STATUS_SLEEPING = 4;
}

enum AccessMode {
  ACCESS_MODE_UNSPECIFIED = 0;
  ACCESS_MODE_PUBLIC = 1;
  ACCESS_MODE_PRIVATE = 2;
  ACCESS_MODE_MEMBERS_ONLY = 3;
}

enum BuildStrategy {
  BUILD_STRATEGY_UNSPECIFIED = 0;
  BUILD_STRATEGY_DOCKERFILE = 1;
}

enum DockerfileSource {
  DOCKERFILE_SOURCE_UNSPECIFIED = 0;
  DOCKERFILE_SOURCE_PATH = 1;
  DOCKERFILE_SOURCE_INLINE = 2;
}

message Application {
  string id = 1;
  string project_id = 2;
  string name = 3;
  ApplicationSource source = 4;
  string branch = 5;
  ApplicationStatus status = 6;
  string url = 7;
  string owner_user_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ApplicationSource {
  Repository repository = 1 [(buf.validate.field).required = true];
  string branch = 3 [(buf.validate.field).required = true];
}

message DockerfileBuildConfig {
  DockerfileSource source = 1 [(buf.validate.field).required = true];
  string dockerfile_path = 2;
  string dockerfile_inline = 3;
}

message BuildConfig {
  BuildStrategy strategy = 1 [(buf.validate.field).required = true];
  DockerfileBuildConfig dockerfile = 2 [(buf.validate.field).required = true];
}


message Access {
  AccessMode mode = 1 [(buf.validate.field).required = true];
  Domain domain = 2;
  int32 port = 3 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).int32.lte = 65535
  ];
}

message ApplicationSpec {
  string project_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  ApplicationSource source = 3 [(buf.validate.field).required = true];
  BuildConfig build = 4 [(buf.validate.field).required = true];
  Access access = 5 [(buf.validate.field).required = true];
  map<string, string> environment_variables = 8;
  map<string, string> secrets = 9;
}

message CreateApplicationRequest {
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 100
  ];
  string owner_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  ApplicationSpec spec = 3 [(buf.validate.field).required = true];
}

message CreateApplicationResponse {
  Application application = 1;
  optional string initial_deployment_id = 2;
  bool initial_deployment_started = 3;
  optional string initial_deployment_error = 4;
}

message GetApplicationRequest {
  string application_id = 1 [(buf.validate.field).required = true];
}

message GetApplicationResponse {
  Application application = 1;
}

message ListApplicationsRequest {
  string project_id = 1 [(buf.validate.field).required = true];
}

message ListApplicationsResponse {
  repeated Application applications = 1;
}

message UpdateApplicationRequest {
  string application_id = 1 [(buf.validate.field).required = true];
  string name = 2 [(buf.validate.field).required = true];
  string owner_id = 3 [(buf.validate.field).required = true];
  ApplicationSpec spec = 4 [(buf.validate.field).required = true];
}

message UpdateApplicationResponse {
  Application application = 1;
}

message DeleteApplicationRequest {
  string application_id = 1 [(buf.validate.field).required = true];
}

message DeleteApplicationResponse {}

message GitRepository {
  string id = 1;
  string default_branch = 2;
  repeated string branches = 3;
  repeated string detected_file = 4;
  repeated string dockerfile_paths = 5;
}

message ListGitRepositoriesRequest {}

message ListGitRepositoriesResponse {
  repeated GitRepository repositories = 1;
}

service ApplicationService {
  rpc CreateApplication(CreateApplicationRequest) returns (CreateApplicationResponse);
  rpc GetApplication(GetApplicationRequest) returns (GetApplicationResponse);
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc UpdateApplication(UpdateApplicationRequest) returns (UpdateApplicationResponse);
  rpc DeleteApplication(DeleteApplicationRequest) returns (DeleteApplicationResponse);
  rpc ListGitRepositories(ListGitRepositoriesRequest) returns (ListGitRepositoriesResponse);
}
