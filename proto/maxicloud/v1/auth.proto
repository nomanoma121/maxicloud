syntax = "proto3";

package maxicloud.v1;

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_INVITED = 2;
  USER_STATUS_SUSPENDED = 3;
}

message UserAccount {
  string id = 1;
  string display_id = 2;
  string display_name = 3;
  string email = 4;
  UserStatus status = 5;
  string joined_at = 6;
}

message CreateLoginUrlRequest {
  string redirect_to = 1;
}

message CreateLoginUrlResponse {
  string login_url = 1;
  string state = 2;
}

message CompleteLoginRequest {
  string code = 1;
  string state = 2;
  string code_verifier = 3;
}

message CompleteLoginResponse {
  UserAccount user = 1;
}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  UserAccount user = 1;
}

message LogoutRequest {}

message LogoutResponse {}

service AuthService {
  rpc CreateLoginUrl(CreateLoginUrlRequest) returns (CreateLoginUrlResponse);
  rpc CompleteLogin(CompleteLoginRequest) returns (CompleteLoginResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}
