syntax = "proto3";

package maxicloud.v1;

import "maxicloud/v1/common.proto";

enum DeploymentStatus {
  DEPLOYMENT_STATUS_UNSPECIFIED = 0;
  DEPLOYMENT_STATUS_SUCCESS = 1;
  DEPLOYMENT_STATUS_RUNNING = 2;
  DEPLOYMENT_STATUS_FAILED = 3;
}

message Commit {
  string sha = 1;
  string message = 2;
  string author_name = 3;
  string timestamp = 5;
}

message DeploymentRun {
  string id = 1;
  string service_id = 2;
  string owner_user_id = 3;
  Commit commit = 5;
  DeploymentStatus status = 6;
  string started_at = 7;
  string duration = 8;
}

message CreateDeploymentRequest {
  string service_id = 1;
  string branch = 2;
  repeated KeyValue environment = 5;
}

message CreateDeploymentResponse {
  DeploymentRun deployment = 1;
}

message GetDeploymentRequest {
  string deployment_id = 1;
}

message GetDeploymentResponse {
  DeploymentRun deployment = 1;
}

message ListDeploymentsRequest {
  string service_id = 2;
}

message ListDeploymentsResponse {
  repeated DeploymentRun deployments = 1;
}

service DeploymentService {
  rpc CreateDeployment(CreateDeploymentRequest) returns (CreateDeploymentResponse);
  rpc GetDeployment(GetDeploymentRequest) returns (GetDeploymentResponse);
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);
}
