syntax = "proto3";

package maxicloud.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

message Project {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  string name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.max_len = 100
  ];
  string description = 3 [
    (buf.validate.field).string.max_len = 200
  ];
  string owner_user_id = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  google.protobuf.Timestamp created_at = 5 [(buf.validate.field).required = true];
  google.protobuf.Timestamp updated_at = 6 [(buf.validate.field).required = true];
}

message CreateProjectRequest {
  string name = 1 [(buf.validate.field).required = true,
    (buf.validate.field).string.max_len = 64, 
    (buf.validate.field).string.pattern = "^[A-Za-z0-9][-A-Za-z0-9_.]*[A-Za-z0-9]$"
  ];
  string description = 2 [
    (buf.validate.field).string.max_len = 200
  ];
  string owner_user_id = 3 [(buf.validate.field).required = true];
}

message CreateProjectResponse {
  Project project = 1;
}

message GetProjectRequest {
  string project_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

message GetProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message UpdateProjectRequest {
  string project_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  optional string name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.max_len = 100
  ];
  optional string description = 3 [(buf.validate.field).string.max_len = 200];
  optional string owner_user_id = 4 [(buf.validate.field).required = true];
}

message UpdateProjectResponse {
  Project project = 1;
}

message DeleteProjectRequest {
  string project_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

message DeleteProjectResponse {}

service ProjectService {
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);
}
